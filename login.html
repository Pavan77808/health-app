<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Health App Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo h1 { color: #2563eb; font-size: 28px; }
    .logo p { color: #666; font-size: 14px; margin-top: 5px; }
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      margin-bottom: 6px;
      color: #333;
      font-size: 14px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
    }
    input:focus { border-color: #2563eb; }
    .btn {
      width: 100%;
      padding: 13px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    .btn:hover { background: #1d4ed8; }
    .msg {
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 15px;
      display: none;
      text-align: center;
    }
    .error { background: #fee2e2; color: #dc2626; }
    .success { background: #dcfce7; color: #16a34a; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <h1>🏥 HealthApp</h1>
      <p>Hospital Management System</p>
    </div>

    <div class="msg error" id="errorMsg"></div>
    <div class="msg success" id="successMsg"></div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" />
    </div>

    <button class="btn" id="loginBtn" onclick="login()">Login</button>
  </div>

  <script>
    const API = "http://127.0.0.1:8000";

    function showError(msg) {
      const el = document.getElementById("errorMsg");
      el.textContent = msg;
      el.style.display = "block";
      document.getElementById("successMsg").style.display = "none";
    }

    function showSuccess(msg) {
      const el = document.getElementById("successMsg");
      el.textContent = msg;
      el.style.display = "block";
      document.getElementById("errorMsg").style.display = "none";
    }

    async function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const btn = document.getElementById("loginBtn");

      if (!username || !password) {
        showError("Please enter username and password");
        return;
      }

      btn.textContent = "Logging in...";
      btn.disabled = true;

      try {
        const response = await fetch(API + "/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({
            username: username,
            password: password
          })
        });

        let data;
        try {
          data = await response.json();
        } catch(e) {
          showError("Server returned invalid response");
          btn.textContent = "Login";
          btn.disabled = false;
          return;
        }

        if (response.status === 200) {
          localStorage.setItem("token", data.access_token);
          localStorage.setItem("user", JSON.stringify(data.user));
          showSuccess("Login successful! Redirecting...");
          setTimeout(function() {
            window.location.href = "dashboard.html";
          }, 1000);
        } else if (response.status === 401) {
          showError("Wrong username or password");
        } else if (response.status === 422) {
          showError("Please check your username and password");
        } else {
          showError("Login failed: " + (data.detail || "Unknown error"));
        }

      } catch(err) {
        showError("Cannot connect to server. Make sure backend is running on port 8000!");
        console.error("Error:", err);
      }

      btn.textContent = "Login";
      btn.disabled = false;
    }

    document.addEventListener("keypress", function(e) {
      if (e.key === "Enter") login();
    });
  </script>
</body>
</html>
